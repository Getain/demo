<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据预处理 - 高光谱图像处理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container {
            max-width: 800px;
            margin-top: 50px;
        }
        .process-form {
            border: 2px dashed #ccc;
            padding: 20px;
            border-radius: 5px;
            background-color: #f8f9fa;
        }
        .data-info {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">高光谱图像处理系统</h1>
        <div class="process-form">
            <h3 class="mb-3">第二步：数据预处理</h3>

            <div class="data-info">
                <h5>数据信息：</h5>
                <p>图像大小: {{ data_shape[0] }} × {{ data_shape[1] }} 像素</p>
                <p>波段数量: {{ num_bands }} 个波段</p>
            </div>

            <form action="{{ url_for('preprocess') }}" method="post">
                <div class="mb-3">
                    <label for="snr_threshold" class="form-label">信噪比阈值：</label>
                    <input type="number" step="0.01" class="form-control" id="snr_threshold" name="snr_threshold"
                           value="0.1" min="0" max="1" required>
                    <div class="form-text">用于剔除低信噪比波段（建议值：0.1-0.5）</div>
                </div>

                <div class="mb-3">
                    <label for="n_components" class="form-label">PCA降维组件数：</label>
                    <input type="number" class="form-control" id="n_components" name="n_components"
                           value="30" min="1" max="{{ num_bands }}" required>
                    <div class="form-text">PCA降维后保留的主成分数量（最大值：{{ num_bands }}）</div>
                </div>

                <p class="text-muted">处理步骤：SNR波段剔除 → PCA降维 → Z-score标准化</p>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary">开始预处理</button>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
