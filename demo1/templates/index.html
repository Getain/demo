<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高光谱图像处理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container {
            max-width: 800px;
            margin-top: 50px;
        }
        .upload-form {
            border: 2px dashed #ccc;
            padding: 20px;
            border-radius: 5px;
            background-color: #f8f9fa;
        }
        .file-input-container {
            margin-bottom: 20px;
        }
        .file-requirements {
            color: #6c757d;
            font-size: 0.875rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">高光谱图像处理系统</h1>
        <div class="upload-form">
            <h3 class="mb-3">第一步：数据输入</h3>
            <form action="{{ url_for('upload') }}" method="post" enctype="multipart/form-data">
                <div class="file-input-container">
                    <label for="hyperspectral" class="form-label">高光谱影像文件：</label>
                    <input type="file" class="form-control" id="hyperspectral" name="hyperspectral" accept=".mat" required>
                    <div class="file-requirements">
                        请上传.mat格式的高光谱数据文件
                        <br>
                        文件格式要求：包含名为'data'的三维数组变量 (高度 × 宽度 × 波段数)
                    </div>
                </div>

                <div class="file-input-container">
                    <label for="label" class="form-label">标签文件：</label>
                    <input type="file" class="form-control" id="label" name="label" accept=".mat" required>
                    <div class="file-requirements">
                        请上传.mat格式的标签文件
                        <br>
                        文件格式要求：包含名为'label'的标签数组
                    </div>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary">下一步</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
