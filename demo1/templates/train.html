<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型预测 - 高光谱图像处理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container {
            max-width: 800px;
            margin-top: 50px;
        }
        .model-form {
            border: 2px dashed #ccc;
            padding: 20px;
            border-radius: 5px;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">高光谱图像处理系统</h1>
        <div class="model-form">
            <h3 class="mb-3">第三步：模型预测</h3>

            <form action="{{ url_for('train') }}" method="post">
                <div class="alert alert-info" role="alert">
                    使用预训练模型进行预测，这将显著提高处理速度和准确性。
                </div>

                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary">开始预测</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
